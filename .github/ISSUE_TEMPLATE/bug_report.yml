name: Bug report
description: Report a reproducible problem in package code, tests, or scripts.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands or Julia code that reproduce the issue.
      render: julia
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include errors, logs, or incorrect output.
    validations:
      required: true
  - type: input
    id: julia
    attributes:
      label: Julia Version
      placeholder: "1.10, 1.11, nightly, etc."
  - type: textarea
    id: environment
    attributes:
      label: Environment Notes
      description: OS, branch, relevant package versions, or generated data paths.
